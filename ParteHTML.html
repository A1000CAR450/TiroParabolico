<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <title>Tiro Parabólico</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>

    <div class="contenedor">
        <h1>Simulador de Tiro Parabólico</h1>

        <div class="controles">
            <label>Velocidad Inicial (m/s)</label>
            <input type="number" id="velocidad" value="30">

            <label>Ángulo (grados)</label>
            <input type="number" id="angulo" value="45">

            <button onclick="simular()">Simular</button>
        </div>

        <canvas id="canvas" width="800" height="400"></canvas>

        <div id="resultados"></div>
    </div>

    <script src="script.js"></script>
</body>
</html>
